services:
  api:
    image: python:3.12-slim
    container_name: dbms_bao_api
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python app.py"
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - redis

  celery_worker:
    image: python:3.12-slim
    container_name: dbms_bao_celery_worker
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && celery -A workers.celery_app.celery_app worker -l info"
    env_file:
      - .env
    depends_on:
      - redis

  celery_beat:
    image: python:3.12-slim
    container_name: dbms_bao_celery_beat
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && celery -A workers.celery_app.celery_app beat -l info"
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:8.6.2-alpine
    container_name: dbms_bao_redis
    ports:
      - "6379:6379"
